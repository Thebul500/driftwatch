name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'ci_test_password' }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: driftwatch
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'ci_test_password' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DRIFTWATCH_DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_POSTGRES_PASSWORD }}@localhost:5432/driftwatch
      DRIFTWATCH_SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Run tests with coverage
        run: pytest --cov=driftwatch --cov-report=xml --cov-report=term-missing --cov-fail-under=50 -v
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    env:
      DRIFTWATCH_SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Lint with ruff
        run: ruff check src/
      - name: Type check with mypy
        run: mypy src/driftwatch/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    env:
      DRIFTWATCH_SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Security scan with bandit
        run: bandit -r src/driftwatch/ -q
